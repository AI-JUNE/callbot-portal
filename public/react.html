<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>CallBot · React</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f6f5f3;--panel:#fff;--panel2:#f7f6f4;--line:#e9e6e1;--line2:#f0eee9;--txt:#22201d;--mut:#6b6660;--dim:#a39d95;--accent:#2f6bff;--warm:#be5535;--warm2:#9f4226;--warmbg:#fbe9e1;--green:#1a8f54;--greenbg:#dcf3e6;--red:#d23a5a;--redbg:#fbe2e7;--sh:0 1px 2px rgba(40,32,26,.05),0 2px 8px rgba(40,32,26,.06)}
*{box-sizing:border-box}html,body,#root{margin:0;height:100%}
body{background:var(--bg);color:var(--txt);font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;font-size:14px;letter-spacing:-.01em}
.app{display:grid;grid-template-columns:236px 1fr;height:100vh;overflow:hidden}
.side{background:var(--panel);border-right:1px solid var(--line);padding:16px 12px;display:flex;flex-direction:column;overflow:auto}
.brand{display:flex;gap:10px;align-items:center;font-weight:800;padding:6px 8px 16px;cursor:pointer}
.brand .lg{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#be5535,#d8703f);display:grid;place-items:center;color:#fff;box-shadow:var(--sh)}
.brand small{display:block;color:var(--dim);font-size:9px;font-weight:700}
.navsec{color:var(--dim);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:12px 10px 5px;font-weight:800}
.nav a{display:flex;gap:10px;align-items:center;color:var(--mut);padding:10px 11px;border-radius:10px;cursor:pointer;font-weight:600;text-decoration:none}
.nav a.on{background:var(--warmbg);color:var(--warm2)}.nav a:hover{background:var(--panel2)}
.main{overflow:auto}
.topbar{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:14px 22px}
.topbar h2{margin:0;font-size:18px;font-weight:800}.crumb{color:var(--dim);font-size:12px}.sp{flex:1}
.hamb{display:none;width:38px;height:38px;border-radius:9px;place-items:center;border:1px solid var(--line);background:var(--panel);cursor:pointer;font-size:18px}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2f6bff,#6a4cff);color:#fff;display:grid;place-items:center;font-weight:700}
button{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:9px 13px;cursor:pointer;font-weight:700;box-shadow:var(--sh)}
button.primary{background:var(--warm);border:0;color:#fff}
.wrap{padding:22px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh)}
.card h3{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin:0;padding:14px 18px;border-bottom:1px solid var(--line2);font-weight:800}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi:before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#be5535,#2f6bff)}
.kpi .l{color:var(--mut);font-size:12px;font-weight:700}.kpi .v{font-size:23px;font-weight:800;margin-top:8px}.kpi .s{font-size:11px;color:var(--green);margin-top:5px;font-weight:700}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex-wrap:wrap}
.seg button{border:0;border-radius:0;box-shadow:none;background:var(--panel);padding:7px 12px;color:var(--mut)}
.seg button.on{background:var(--warm);color:#fff}
.callstage{background:linear-gradient(180deg,#fbf1ec,#fff 60%);border:1px solid var(--line);border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;box-shadow:var(--sh)}
.orb{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#fff,#fbe9e1);box-shadow:0 8px 24px rgba(190,85,53,.16),inset 0 0 0 1px #f1ddd3;display:grid;place-items:center;font-size:44px;margin:12px 0}
.tr{width:100%;max-width:640px;display:flex;flex-direction:column;gap:10px;margin-top:16px}
.tb{max-width:82%;padding:11px 14px;border-radius:14px;line-height:1.5;font-size:15px}
.tb.me{align-self:flex-end;background:var(--warm);color:#fff}.tb.bot{align-self:flex-start;background:var(--panel2);border:1px solid var(--line)}
.inbar{display:flex;gap:8px;padding:14px;border-top:1px solid var(--line2)}
.inbar input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:11px 16px;border-bottom:1px solid var(--line2)}th{color:var(--mut);font-weight:800;font-size:12px;background:var(--panel2)}
.subtot td{background:var(--panel2);font-weight:800}
.node{min-width:110px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;display:inline-block;margin:4px}
.node .ty{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;background:#e6ecff;color:#2747c9;display:inline-block;margin-bottom:6px}
.row{display:flex;justify-content:space-between;padding:11px 18px;font-size:13px}
.tag{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:700}.tag.pos{background:var(--greenbg);color:#15803d}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:69}
@media(max-width:820px){
 .app{grid-template-columns:1fr}
 .side{position:fixed;top:0;bottom:0;left:0;width:250px;z-index:70;transform:translateX(-100%);transition:transform .25s}
 .side.open{transform:none;box-shadow:0 0 40px rgba(0,0,0,.25)}
 .scrim.on{display:block}.hamb{display:grid}
 .kpis{grid-template-columns:repeat(2,1fr)}.wrap{padding:14px}.topbar{padding:12px 14px}
 table{display:block;overflow-x:auto;white-space:nowrap}
}
@media(max-width:480px){.kpis{grid-template-columns:1fr}}
.umenu{position:absolute;top:44px;right:0;min-width:210px;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 28px rgba(40,32,26,.16);padding:6px;z-index:40}
.umenu .uhead{display:flex;gap:10px;align-items:center;padding:10px 10px;border-bottom:1px solid var(--line2);margin-bottom:4px}
.umenu .uava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2f6bff,#6a4cff);color:#fff;display:grid;place-items:center;font-weight:800}
.umenu .uit{padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px}.umenu .uit:hover{background:var(--panel2)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const NAV=[
 {sec:'상담',items:[['voice','🎙️','음성 상담'],['chat','💬','텍스트 상담']]},
 {sec:'운영',items:[['home','📊','대시보드'],['stat','📈','콜봇 이용통계'],['scn','🧩','시나리오'],['qa','🎯','품질성능평가']]},
];
const TITLES={voice:['음성 상담','실시간 음성 상담'],chat:['텍스트 상담','채팅 데모'],home:['대시보드','운영 현황'],stat:['콜봇 이용통계','인바운드 현황'],scn:['시나리오','대화 흐름·대본'],qa:['품질성능평가','시나리오·지표']};
const DEMO={refund:{name:'반품·환불',open:'고객센터입니다. 무엇을 도와드릴까요?'},integrity:{name:'여신 청렴도 조사',open:'안녕하세요, 고객센터 상담원입니다. 홍길동 고객님 되십니까?'},overdue:{name:'연체 안내',open:'AI 상담원입니다. 이용 중인 대출 상품에 연체가 발생하여 연락드렸습니다.'}};
const SCN={
 refund:{flow:[['콜처리','인입·본인확인'],['LLM','의도분석'],['조회','주문 API'],['조건부','사유 분기'],['LLM+RAG','정책·견적'],['DTMF','동의 게이트'],['종료','접수·SMS']],
  script:[['의도/사유','반품하고 싶어요','반품·교환·환불 분기'],['확정 게이트','네','동의 직후에만 실행'],['접수','—','환불 접수·SMS']]},
 integrity:{flow:[['콜처리','맞이인사'],['콜처리','본인확인'],['DTMF','생년월일 6자리'],['안내','통화목적'],['LLM','가입여부'],['조건부','부당요구'],['조건부','자발적가입'],['종료','감사·종료']],
  script:[['본인확인','생년월일 6자리 입력','3회 오입력→종료'],['가입 여부','지점·일자 가계대출 맞는지','아니오→재연락'],['부당요구','부당 담보·보증 요구 경험','있음→대상·내용'],['자발적 가입','자발적 가입의사','네/아니오']]},
 overdue:{flow:[['콜처리','첫인사(연체)'],['LLM','의도분류(sLLM)'],['조건부','의도 분기'],['RAG','문서검색'],['LLM','생성형 답변'],['응대','계속/종결'],['종료','종료']],
  script:[['갚을 예정','곧 갚을게요','신용 영향 안내'],['이미 갚음','입금했어요','오전 조회 안내'],['연체사실 모름','연체라니요','미납금 37,000원'],['답변 거부','날씨·저녁메뉴','도와드리기 어렵습니다']]}
};
function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.lang='ko-KR';speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}

function Donut({data}){const ref=useRef();useEffect(()=>{const c=new Chart(ref.current,{type:'doughnut',data:{labels:['콜봇처리','연계','멀티모달','문자','상담사','거부','이탈'],datasets:[{data,backgroundColor:['#2f6bff','#16a3a3','#7c3aed','#d97706','#1a8f54','#9aa4b6','#d23a5a'],borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{position:'bottom',labels:{color:'#6b6660'}}}}});return()=>c.destroy();},[]);return <canvas ref={ref} style={{maxHeight:240}}/>;}

async function callApi(messages,scenario){const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages,phone:'01012345678',scenario})});return r.json();}

function Voice({scn,setScn}){
 const [msgs,setMsgs]=useState([]);const [status,setStatus]=useState('통화를 시작하세요');const [active,setActive]=useState(false);
 const recRef=useRef(null);const activeRef=useRef(false);
 const add=(role,text)=>setMsgs(m=>[...m,{role,text}]);
 const listen=()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert('Chrome 권장');return;}
  const rec=new SR();rec.lang='ko-KR';rec.interimResults=false;recRef.current=rec;setStatus('듣고 있어요…');
  rec.onresult=async e=>{const t=e.results[0][0].transcript;add('me',t);setStatus('처리 중…');
   const st=await callApi([...msgs,{role:'user',content:t}].map(x=>({role:x.role==='me'?'user':'assistant',content:x.text})),scn).catch(()=>({reply:'[오류]'}));
   add('bot',st.reply||st.error||'[오류]');setStatus('응답 중…');speak(st.reply||'');setTimeout(()=>{if(activeRef.current)listen();else setStatus('대기');},900);};
  rec.onerror=()=>{};rec.onend=()=>{};try{rec.start();}catch(e){}};
 const start=()=>{setActive(true);activeRef.current=true;const o=DEMO[scn].open;add('bot',o);speak(o);setTimeout(()=>{if(activeRef.current)listen();},1200);};
 const end=()=>{setActive(false);activeRef.current=false;try{recRef.current&&recRef.current.stop();}catch(e){}speechSynthesis.cancel();setStatus('통화 종료');};
 return <div>
  <div style={{marginBottom:12,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}><b style={{fontSize:12,color:'var(--mut)'}}>데모 시나리오</b>
   <span className="seg">{Object.keys(DEMO).map(k=><button key={k} className={scn===k?'on':''} onClick={()=>{setScn(k);setMsgs([]);}}>{DEMO[k].name}</button>)}</span></div>
  <div className="callstage">
   <div className="orb">{active?'👂':'🎙️'}</div>
   <div style={{fontWeight:800,fontSize:17}}>{status}</div>
   <div style={{marginTop:16}}>{!active?<button className="primary" style={{padding:'12px 24px',borderRadius:30}} onClick={start}>📞 통화 시작</button>:<button style={{padding:'12px 24px',borderRadius:30,border:'1px solid var(--red)',color:'var(--red)',background:'#fff'}} onClick={end}>⏹ 통화 종료</button>}</div>
   <div className="tr">{msgs.map((m,i)=><div key={i} className={'tb '+(m.role==='me'?'me':'bot')}>{m.text}</div>)}</div>
   <div style={{color:'var(--dim)',fontSize:12,marginTop:12}}>연속 통화 모드 · 봇이 말한 뒤 자동으로 다시 듣습니다 (Chrome)</div>
  </div></div>;
}

function Chat({scn,setScn}){
 const [msgs,setMsgs]=useState([{role:'bot',text:DEMO[scn].open}]);const [val,setVal]=useState('');
 useEffect(()=>{setMsgs([{role:'bot',text:DEMO[scn].open}]);},[scn]);
 const send=async()=>{const t=val.trim();if(!t)return;setVal('');const nm=[...msgs,{role:'me',text:t}];setMsgs(nm);
  const st=await callApi(nm.map(x=>({role:x.role==='me'?'user':'assistant',content:x.text})),scn).catch(()=>({reply:'[오류]'}));
  setMsgs(m=>[...m,{role:'bot',text:st.reply||st.error||'[오류]'}]);speak(st.reply||'');};
 return <div className="card" style={{display:'flex',flexDirection:'column'}}>
  <h3>💬 실시간 대화</h3>
  <div style={{padding:'10px 14px 0',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}><b style={{fontSize:12,color:'var(--mut)'}}>데모</b>
   <span className="seg">{Object.keys(DEMO).map(k=><button key={k} className={scn===k?'on':''} onClick={()=>setScn(k)}>{DEMO[k].name}</button>)}</span></div>
  <div style={{height:'50vh',overflow:'auto',padding:16,display:'flex',flexDirection:'column',gap:10}}>{msgs.map((m,i)=><div key={i} className={'tb '+(m.role==='me'?'me':'bot')}>{m.text}</div>)}</div>
  <div className="inbar"><input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="메시지 입력 후 Enter…"/><button className="primary" onClick={send}>보내기</button></div>
 </div>;
}

function Home(){return <div>
 <div className="kpis">
  {[['🎯 STT 인식률','96.2%','목표 ≥90%'],['🧠 답변정확도','94.8%','목표 ≥90%'],['⚡ 응답속도','1.1s','≤2s'],['🛒 자동완결률','71%','목표 75%'],['😊 CSAT','4.4/5','감정기반'],['📞 처리 통화','214','오늘']].map((k,i)=>
   <div className="kpi" key={i}><div className="l">{k[0]}</div><div className="v">{k[1]}</div><div className="s">{k[2]}</div></div>)}
 </div>
 <div className="card"><h3>처리 유형 분포</h3><div style={{padding:16}}><Donut data={[2118,612,540,388,96,348,176]}/></div></div>
</div>;}

function Stat(){const rows=[['소계',4182,2118,612,540,388,96,348,176],['2026-06-30',1420,735,205,182,128,34,96,40],['2026-06-29',1388,702,201,178,132,31,94,50]];
 return <div className="card"><h3>콜봇 이용통계 (인바운드)</h3>
  <table><thead><tr>{['일자','총인입','콜봇처리','연계','멀티모달','문자','상담사','거부','이탈'].map(h=><th key={h}>{h}</th>)}</tr></thead>
  <tbody>{rows.map((r,i)=><tr key={i} className={i===0?'subtot':''}>{r.map((c,j)=><td key={j}>{c}</td>)}</tr>)}</tbody></table></div>;}

function Scenario(){const [k,setK]=useState('refund');const d=SCN[k];
 return <div className="card"><h3>🧩 시나리오 빌더</h3>
  <div style={{padding:'12px 16px'}}><span className="seg">{Object.keys(SCN).map(x=><button key={x} className={k===x?'on':''} onClick={()=>setK(x)}>{DEMO[x].name}</button>)}</span></div>
  <div style={{padding:'0 16px 8px',overflowX:'auto',whiteSpace:'nowrap'}}>{d.flow.map((n,i)=><span key={i}><span className="node"><span className="ty">{n[0]}</span><b>{n[1]}</b></span>{i<d.flow.length-1?' → ':''}</span>)}</div>
  <table><thead><tr><th>단계/의도</th><th>고객 발화</th><th>분기·처리</th></tr></thead><tbody>{d.script.map((r,i)=><tr key={i}><td><b>{r[0]}</b></td><td style={{color:'var(--mut)'}}>{r[1]}</td><td style={{color:'var(--mut)'}}>{r[2]}</td></tr>)}</tbody></table></div>;}

function Qa(){return <div>
 <div className="kpis">{[['STT 인식률','96.2%'],['의도분석','94.8%'],['의도 재분류','92.5%'],['문장수 준수','98.1%'],['답변 거부','100%'],['응답시간','1.1s']].map((k,i)=>
  <div className="kpi" key={i}><div className="l">{k[0]}</div><div className="v">{k[1]}</div></div>)}</div>
 <div className="card"><h3>주요 기능 구현</h3>{['DTMF 생년월일 입력','바지인 즉시 의도분석','음성 속도·음량 조절','GUI 시나리오 제작','sLLM + RAG'].map((t,i)=>
  <div className="row" key={i}><span>{t}</span><span className="tag pos">지원</span></div>)}</div>
</div>;}

function AdminMenu({go}){const [o,setO]=useState(false);
 return <div style={{position:'relative'}}>
  <div className="avatar" style={{cursor:'pointer'}} onClick={()=>setO(v=>!v)}>관</div>
  {o&&<div className="umenu" onMouseLeave={()=>setO(false)}>
   <div className="uhead"><div className="uava">관</div><div><b>관리자</b><div style={{fontSize:11,color:'var(--dim)'}}>운영 관리자 · CS본부</div></div></div>
   <div className="uit" onClick={()=>{go('home');setO(false);}}>📊 대시보드</div>
   <div className="uit" onClick={()=>{go('qa');setO(false);}}>🎯 품질성능평가</div>
   <div className="uit" onClick={()=>{go('scn');setO(false);}}>🧩 시나리오</div>
   <div className="uit" onClick={()=>{alert('환경 설정 (데모)');setO(false);}}>⚙️ 환경 설정</div>
   <div className="uit" onClick={()=>{alert('알림 설정 (데모)');setO(false);}}>🔔 알림 설정</div>
   <div className="uit" style={{color:'var(--red)'}} onClick={()=>location.reload()}>↻ 로그아웃</div>
  </div>}
 </div>;
}
function App(){
 const [view,setView]=useState('home');const [open,setOpen]=useState(false);const [scn,setScn]=useState('refund');
 const go=v=>{setView(v);setOpen(false);};
 return <div className="app">
  <aside className={'side'+(open?' open':'')}>
   <div className="brand" onClick={()=>go('home')}><span className="lg">☎</span><div>CallBot<small>REACT · MOBILE</small></div></div>
   {NAV.map((g,i)=><div key={i}><div className="navsec">{g.sec}</div><nav className="nav">{g.items.map(it=>
    <a key={it[0]} className={view===it[0]?'on':''} onClick={()=>go(it[0])}><span>{it[1]}</span> {it[2]}</a>)}</nav></div>)}
   <div style={{marginTop:'auto',color:'var(--dim)',fontSize:11,padding:10}}>React 반응형 · 동일 백엔드(/api)</div>
  </aside>
  <div className={'scrim'+(open?' on':'')} onClick={()=>setOpen(false)}></div>
  <main className="main">
   <div className="topbar">
    <div className="hamb" onClick={()=>setOpen(true)}>☰</div>
    <div><h2>{TITLES[view][0]}</h2><div className="crumb">{TITLES[view][1]}</div></div>
    <span className="sp"></span><AdminMenu go={go}/>
   </div>
   <div className="wrap">
    {view==='voice'&&<Voice scn={scn} setScn={setScn}/>}
    {view==='chat'&&<Chat scn={scn} setScn={setScn}/>}
    {view==='home'&&<Home/>}
    {view==='stat'&&<Stat/>}
    {view==='scn'&&<Scenario/>}
    {view==='qa'&&<Qa/>}
   </div>
  </main>
 </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
